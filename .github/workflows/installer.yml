name: Installer CI

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'scripts/**'
      - 'gtbi.manifest.yaml'
      - 'checksums.yaml'
      - 'packages/manifest/**'
      - '.github/workflows/*.yml'
      - '.shellcheckrc'
      - 'tests/**/*.sh'
      - 'tests/docker/**'
  # No paths filter on pull_request: the workflow must always run so the
  # required "CI Gate" status check always reports. The "changes" job below
  # decides whether the installer-relevant jobs actually need to run.
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter installer-relevant paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'install.sh'
              - 'scripts/**'
              - 'gtbi.manifest.yaml'
              - 'checksums.yaml'
              - 'packages/manifest/**'
              - '.github/workflows/*.yml'
              - '.shellcheckrc'
              - 'tests/**/*.sh'
              - 'tests/docker/**'

  yaml-lint:
    name: Workflow YAML Lint
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint workflow YAML files
        run: |
          # Create minimal config that catches critical YAML syntax errors
          cat > /tmp/yamllint.yml << 'EOF'
          extends: default
          rules:
            line-length:
              max: 200
            key-ordering: disable
            comments:
              min-spaces-from-content: 1
            document-start: disable
            document-end: disable
            indentation:
              spaces: 2
              indent-sequences: whatever
            truthy:
              allowed-values: ['true', 'false', 'on', 'off']
          EOF

          echo "Validating YAML syntax for all workflow files..."
          yamllint -c /tmp/yamllint.yml .github/workflows/*.yml
          echo "✅ All workflow YAML files have valid syntax"

  shellcheck:
    name: ShellCheck
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: Run ShellCheck
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          shellcheck "${files[@]}"

      - name: Run declare scoping linter
        run: bash scripts/tests/lint_declare_scoping.sh

      - name: Run pipefail safety linter
        run: bash scripts/tests/lint_pipefail_safety.sh

      - name: Run TTY safety linter
        run: bash scripts/tests/lint_tty_safety.sh

      - name: Run library globals integration test
        run: bash tests/unit/test_lib_globals.sh

      - name: Run installer fault-injection contract test
        run: bash tests/unit/test_installer_fault_contract.sh

      - name: Run release doctor governance tests
        run: bash tests/unit/test_release_doctor.sh

      - name: Run Ubuntu upgrade rehearsal tests
        run: bash scripts/tests/ubuntu_upgrade_test.sh

  manifest-drift:
    name: Manifest Drift Check
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/manifest

      - name: Check manifest drift
        run: bun run generate --diff
        working-directory: packages/manifest

      - name: Run manifest governance tests
        run: bun test src/drift-contract.test.ts src/stack-provenance-report.test.ts
        working-directory: packages/manifest

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate generated scripts (syntax + shellcheck)
        run: |
          EXIT_CODE=0
          echo "Checking generated scripts for syntax errors..."
          for f in scripts/generated/*.sh; do
            [ -f "$f" ] || continue
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f has syntax errors"
              EXIT_CODE=1
            fi
          done

          echo "Running ShellCheck on generated scripts..."
          for f in scripts/generated/*.sh; do
            [ -f "$f" ] || continue
            if ! shellcheck "$f"; then
              echo "FAIL: $f has ShellCheck warnings"
              EXIT_CODE=1
            fi
          done

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "All generated scripts pass syntax and ShellCheck validation"
          fi
          exit $EXIT_CODE

  checksum-verification:
    name: Verify Upstream Checksums
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify all checksums match upstream
        id: verify
        run: |
          chmod +x ./scripts/lib/security.sh

          echo "Verifying checksums against upstream installer scripts..."

          # Run verification and capture result (stderr separate to avoid corrupting JSON)
          if ./scripts/lib/security.sh --verify --json > result.json 2>verify-errors.log; then
            echo "✅ All checksums match upstream"
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "❌ Checksum mismatches detected!"
            echo "status=mismatch" >> $GITHUB_OUTPUT

            # Show what's wrong
            echo ""
            echo "=== Mismatched checksums ==="
            jq -r '.mismatches[] | "  \(.name): expected \(.expected), got \(.actual)"' result.json 2>/dev/null || true

            echo ""
            echo "=== To fix locally ==="
            echo "  ./scripts/lib/security.sh --update-checksums > checksums.yaml"
            echo "  git add checksums.yaml && git commit -m 'chore: update checksums'"

            # Fail the job
            exit 1
          fi

      - name: Upload verification result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checksum-verification
          path: result.json

  pinned-ref-smoke:
    name: Pinned Ref Smoke (checksums from main)
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install container prerequisites
        working-directory: /
        run: |
          apt-get update
          apt-get install -y sudo curl git ca-certificates jq unzip tar xz-utils gnupg

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CI sudo
        run: |
          echo 'ubuntu ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ci-ubuntu
          chmod 440 /etc/sudoers.d/90-ci-ubuntu

      - name: Run pinned-ref install (checksums from main)
        run: |
          GTBI_REF="$(cat VERSION)" \
          GTBI_CHECKSUMS_REF=main \
          bash install.sh --yes --skip-preflight --skip-ubuntu-upgrade --mode safe --only lang.uv

  fresh-root-bootstrap-regression:
    name: Fresh Root Bootstrap Regression
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install container prerequisites
        working-directory: /
        run: |
          apt-get update
          apt-get install -y sudo curl git ca-certificates jq unzip tar xz-utils gnupg

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run fresh-root stdin installer regression
        run: bash tests/vm/test_fresh_root_bootstrap_regression.sh --inside-container

  selection-tests:
    name: Selection & Contract Tests
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run selection tests
        run: bash scripts/lib/test_selection.sh

      - name: Run contract tests
        run: bash scripts/lib/test_contract.sh

      - name: Run security tests
        run: bash scripts/lib/test_security.sh

      - name: Run install helpers tests
        run: bash scripts/lib/test_install_helpers.sh

      - name: Run zsh library tests
        run: bash scripts/lib/test_zsh.sh

  test-installer:
    name: Test installer (Ubuntu ${{ matrix.ubuntu }}, mode ${{ matrix.mode }})
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: '24.04'
            mode: vibe
          - ubuntu: '25.04'
            mode: vibe
          - ubuntu: '25.10'
            mode: vibe
          - ubuntu: '24.04'
            mode: safe
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install container prerequisites
        working-directory: /
        run: |
          apt-get update
          apt-get install -y sudo curl git ca-certificates jq unzip tar xz-utils gnupg

      - name: Checkout
        uses: actions/checkout@v4

      - name: Offline bootstrap simulation
        run: |
          bash tests/vm/bootstrap_offline_checks.sh

      - name: Configure CI sudo
        run: |
          # CI needs passwordless sudo for upstream scripts that use sudo internally
          # This is needed for safe mode since it doesn't configure NOPASSWD
          # The ubuntu user is created by install.sh, so we pre-configure sudoers
          echo 'ubuntu ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ci-ubuntu
          chmod 440 /etc/sudoers.d/90-ci-ubuntu

      - name: Run installer
        run: |
          # Skip preflight in CI - GitHub Actions containers have limited disk (17GB < 20GB required)
          # Skip Ubuntu upgrade in CI - containers can't reboot during workflow
          GTBI_CI=true bash install.sh --yes --skip-preflight --skip-ubuntu-upgrade --mode ${{ matrix.mode }}

      - name: Run doctor
        run: |
          su - ubuntu -c "GTBI_DOCTOR_CI=true zsh -ic 'gtbi doctor'"

      - name: Verify key tools
        run: |
          su - ubuntu -c "zsh -ic 'test -f ~/.gtbi/VERSION'"
          su - ubuntu -c "zsh -ic 'gh --version'"
          su - ubuntu -c "zsh -ic 'jq --version'"
          su - ubuntu -c "zsh -ic '~/.cargo/bin/sg --version'"
          su - ubuntu -c "zsh -ic 'git-lfs version'"
          su - ubuntu -c "zsh -ic 'rsync --version'"
          su - ubuntu -c "zsh -ic 'strace --version'"
          su - ubuntu -c "zsh -ic 'command -v lsof >/dev/null'"
          su - ubuntu -c "zsh -ic 'command -v dig >/dev/null'"
          su - ubuntu -c "zsh -ic 'command -v nc >/dev/null'"
          su - ubuntu -c "zsh -ic 'onboard --help'"
          # beads (bd, stack.bd) - issue tracking
          su - ubuntu -c "zsh -ic 'bd --version'"
          # Gastown (gt, stack.gastown) - multi-agent orchestrator
          su - ubuntu -c "zsh -ic 'gt version'"
          su - ubuntu -c "zsh -ic 'sqlite3 --version'"
          # Agents
          su - ubuntu -c "zsh -ic 'claude --version'"
          su - ubuntu -c "zsh -ic 'codex --version'"
          su - ubuntu -c "zsh -ic 'gemini --version'"

  e2e-curlbash-bootstrap:
    name: E2E curl|bash Bootstrap
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install container prerequisites
        working-directory: /
        run: |
          apt-get update
          apt-get install -y sudo curl git ca-certificates jq python3 tar gzip bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CI sudo
        run: |
          echo 'ubuntu ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ci-ubuntu
          chmod 440 /etc/sudoers.d/90-ci-ubuntu

      - name: Run curl|bash bootstrap E2E test
        run: bash tests/e2e/test_curlbash_bootstrap.sh

  e2e-resume-after-failure:
    name: E2E Resume After Failure
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install container prerequisites
        working-directory: /
        run: |
          apt-get update
          apt-get install -y sudo curl git ca-certificates jq unzip tar xz-utils gnupg

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CI sudo
        run: |
          echo 'ubuntu ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ci-ubuntu
          chmod 440 /etc/sudoers.d/90-ci-ubuntu

      - name: Run resume-after-failure E2E test
        run: bash tests/e2e/test_resume_after_failure.sh

  e2e-upgrade-and-repair:
    name: E2E Upgrade and Repair
    needs: changes
    if: ${{ needs.changes.outputs.relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      GTBI_CI: "true"
    steps:
      - name: Install container prerequisites
        working-directory: /
        run: |
          apt-get update
          apt-get install -y sudo curl git ca-certificates jq unzip tar xz-utils gnupg

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CI sudo
        run: |
          mkdir -p /etc/sudoers.d
          echo 'ubuntu ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-gtbi-ubuntu
          chmod 440 /etc/sudoers.d/90-gtbi-ubuntu

      - name: Run upgrade test
        run: bash tests/docker/test_upgrade.sh
        timeout-minutes: 60

      - name: Upload upgrade artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-artifacts
          path: tests/artifacts/upgrade_*.log

      - name: Run repair test
        run: bash tests/docker/test_repair.sh
        timeout-minutes: 60

      - name: Upload repair artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repair-artifacts
          path: tests/artifacts/repair_*.log

  # Single always-reporting aggregate status. This is the only check that
  # branch protection requires, so it must run on every PR (if: always())
  # regardless of whether the installer jobs ran or were path-skipped.
  ci-gate:
    name: CI Gate
    if: ${{ always() }}
    needs:
      - changes
      - yaml-lint
      - shellcheck
      - manifest-drift
      - checksum-verification
      - pinned-ref-smoke
      - fresh-root-bootstrap-regression
      - selection-tests
      - test-installer
      - e2e-curlbash-bootstrap
      - e2e-resume-after-failure
      - e2e-upgrade-and-repair
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Needed job results: $results"
          for r in $results; do
            case "$r" in
              success|skipped) ;;
              *)
                echo "::error::A required CI job did not pass (result: $r)"
                exit 1
                ;;
            esac
          done
          echo "✅ CI Gate: all required jobs passed (or were correctly skipped)."
