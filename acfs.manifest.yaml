  - id: stack.bd
    description: gastownhall beads (bd) - Dolt-backed local-first issue tracker for AI agents
    category: stack
    phase: 9
    run_as: target_user
    optional: false
    enabled_by_default: true
    tags: [critical]
    dependencies:
      - stack.dolt
    installed_check:
      run_as: target_user
      command: "command -v bd"
    install:
      - |
          BD_VER="1.0.4"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  BD_SHA="643e602e27f666c8726abff0f22001e2b5883988fa960204bde20a3129d448a5" ;;
            aarch64|arm64) BD_SHA="48cdf571cd8b64bae81da829c1309e402bc12e6a4cc6b87606dfc9220b7ece60" ;;
            *) echo "Unsupported arch for beads (bd): $ARCH"; exit 1 ;;
          esac

          BD_URL="https://github.com/gastownhall/beads/releases/download/v${BD_VER}/beads_${BD_VER}_linux_${ARCH}.tar.gz"
          TMP_FILE="$(mktemp "${TMPDIR:-/tmp}/acfs_install.XXXXXX")"
          trap 'rm -f "$TMP_FILE"' EXIT

          curl -fsSL "$BD_URL" -o "$TMP_FILE"
          echo "$BD_SHA  $TMP_FILE" | sha256sum -c - || { echo "Checksum failed for bd"; rm "$TMP_FILE"; exit 1; }

          TMP_DIR="$(mktemp -d "${TMPDIR:-/tmp}/acfs_bd.XXXXXX")"
          trap 'rm -rf "$TMP_DIR" "$TMP_FILE"' EXIT
          tar -xzf "$TMP_FILE" -C "$TMP_DIR"
          install -Dm755 "$TMP_DIR/bd" "$HOME/.local/bin/bd"
    verify:
      - bd --version
      - bd stats 2>/dev/null || true

  # ============================================================
  # PHASE 10: Finalization (onboard, doctor, verification)
  # ============================================================
  - id: acfs.workspace
    description: Agent workspace with tmux session and project folder
    category: acfs
    phase: 10
    run_as: target_user
    optional: true
    enabled_by_default: true
    tags: [workspace, agents]
    dependencies:
      - agents.claude
      - agents.codex
      - agents.gemini
      - cli.modern
    installed_check:
      run_as: target_user
      command: "test -d /data/projects/my_first_project"
    install:
      - |
        # Create project directory
        mkdir -p /data/projects/my_first_project
        cd /data/projects/my_first_project
        git init 2>/dev/null || true
      - |
        # Create workspace instructions file
        mkdir -p ~/.acfs
        printf '%s\n' "" \
          "  ACFS AGENT WORKSPACE - QUICK REFERENCE" \
          "  --------------------------------------" \
          "" \
          "  RECONNECT AFTER SSH:" \
          "    tmux attach -t agents    OR just type:  agents" \
          "" \
          "  WINDOWS (Ctrl-b + number):" \
          "    0:welcome  - This instructions window" \
          "    1:claude   - Claude Code (Anthropic)" \
          "    2:codex    - Codex CLI (OpenAI)" \
          "    3:gemini   - Gemini CLI (Google)" \
          "" \
          "  TMUX BASICS:" \
          "    Ctrl-b d        - Detach (keep session running)" \
          "    Ctrl-b c        - Create new window" \
          "    Ctrl-b n/p      - Next/previous window" \
          "    Ctrl-b [0-9]    - Switch to window number" \
          "" \
          "  START AN AGENT:" \
          "    claude          - Start Claude Code" \
          "    codex           - Start Codex CLI" \
          "    gemini          - Start Gemini CLI" \
          "" \
          "  PROJECT: /data/projects/my_first_project" \
          "  (Rename with: mv /data/projects/my_first_project /data/projects/NEW_NAME)" \
          "" > ~/.acfs/workspace-instructions.txt
      - |
        # Create tmux session with agent panes (if not already running)
        SESSION_NAME="agents"
        if ! tmux has-session -t "$SESSION_NAME" 2>/dev/null; then
          # Create session with first window for instructions
          tmux new-session -d -s "$SESSION_NAME" -n "welcome" -c /data/projects/my_first_project

          # Add agent windows
          tmux new-window -t "$SESSION_NAME" -n "claude" -c /data/projects/my_first_project
          tmux new-window -t "$SESSION_NAME" -n "codex" -c /data/projects/my_first_project
          tmux new-window -t "$SESSION_NAME" -n "gemini" -c /data/projects/my_first_project

          # Send instructions to welcome window
          tmux send-keys -t "$SESSION_NAME:welcome" "cat ~/.acfs/workspace-instructions.txt" Enter

          # Select the welcome window
          tmux select-window -t "$SESSION_NAME:welcome"
        fi
      - |
        # Add agents alias to zshrc.local if not already present
        acfs_has_active_agents_alias() {
          local file="${1:-}"
          [[ -f "$file" ]] || return 1

          awk '
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*alias[[:space:]]+agents=/ { found=1; exit }
              END { exit(found ? 0 : 1) }
          ' "$file" 2>/dev/null
        }

        if ! acfs_has_active_agents_alias ~/.zshrc.local; then
          touch ~/.zshrc.local 2>/dev/null || true
          echo '' >> ~/.zshrc.local
          echo '# ACFS agents workspace alias' >> ~/.zshrc.local
          echo 'alias agents="tmux attach -t agents 2>/dev/null || tmux new-session -s agents -c /data/projects"' >> ~/.zshrc.local
        fi
    verify:
      - test -d /data/projects/my_first_project
      - |
        acfs_has_active_agents_alias() {
          local file="${1:-}"
          [[ -f "$file" ]] || return 1

          awk '
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*alias[[:space:]]+agents=/ { found=1; exit }
              END { exit(found ? 0 : 1) }
          ' "$file" 2>/dev/null
        }

        acfs_has_active_agents_alias ~/.zshrc.local || acfs_has_active_agents_alias ~/.zshrc
    notes:
      - "Creates /data/projects/my_first_project as starter project"
      - "Sets up 'agents' tmux session with windows for each coding agent"
      - "Adds 'agents' alias for quick reconnection"

  - id: acfs.onboard
    description: Onboarding TUI tutorial
    category: acfs
    phase: 10
    run_as: target_user
    optional: false
    enabled_by_default: true
    generated: false
    tags: [orchestration]
    notes:
      - "Install onboard script to the configured ACFS bin dir"
    install:
      - |
        onboard_tmp="$(mktemp "${TMPDIR:-/tmp}/acfs-onboard.XXXXXX")"
        trap 'rm -f "$onboard_tmp"' EXIT
        # Install onboard script
        if [[ -n "${ACFS_BOOTSTRAP_DIR:-}" ]] && [[ -f "${ACFS_BOOTSTRAP_DIR}/packages/onboard/onboard.sh" ]]; then
          cp "${ACFS_BOOTSTRAP_DIR}/packages/onboard/onboard.sh" "$onboard_tmp"
        elif [[ -f "packages/onboard/onboard.sh" ]]; then
          cp "packages/onboard/onboard.sh" "$onboard_tmp"
        else
          ACFS_RAW="${ACFS_RAW:-https://raw.githubusercontent.com/jonbackhaus/gtbi/${ACFS_REF:-main}}"
          CURL_ARGS=(-fsSL)
          if curl --help all 2>/dev/null | grep -q -- '--proto'; then
            CURL_ARGS=(--proto '=https' --proto-redir '=https' -fsSL)
          fi
          curl "${CURL_ARGS[@]}" "${ACFS_RAW}/packages/onboard/onboard.sh" -o "$onboard_tmp"
        fi
        acfs_install_executable_into_primary_bin "$onboard_tmp" "onboard"
        if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1 && { [[ ! -e /usr/local/bin/onboard ]] || [[ -L /usr/local/bin/onboard ]]; }; then
          sudo -n ln -sf "$HOME/.acfs/onboard/onboard.sh" /usr/local/bin/onboard
        fi
    verify:
