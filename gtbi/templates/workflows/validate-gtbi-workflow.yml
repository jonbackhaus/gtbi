# GTBI Integration Validation Workflow
#
# Run this workflow to validate that the GTBI notification integration
# is set up correctly in your repository.
#
# Usage:
#   gh workflow run validate-gtbi.yml

name: Validate GTBI Integration

on:
  workflow_dispatch:

env:
  # Must match the value in notify-gtbi.yml
  TOOL_NAME: '{{ TOOL_NAME_PLACEHOLDER }}'
  INSTALLER_PATH: 'install.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check installer exists
        run: |
          if [[ ! -f "${{ env.INSTALLER_PATH }}" ]]; then
            echo "::error::Installer not found at ${{ env.INSTALLER_PATH }}"
            exit 1
          fi
          echo "Installer found at ${{ env.INSTALLER_PATH }}"
          echo "Size: $(stat -c%s "${{ env.INSTALLER_PATH }}") bytes"
          echo "SHA256: $(sha256sum "${{ env.INSTALLER_PATH }}" | cut -d' ' -f1)"

      - name: Check GTBI_REPO_DISPATCH_TOKEN secret
        env:
          TOKEN: ${{ secrets.GTBI_REPO_DISPATCH_TOKEN }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "::error::GTBI_REPO_DISPATCH_TOKEN secret is not set"
            echo "Go to Settings > Secrets > Actions and create GTBI_REPO_DISPATCH_TOKEN"
            exit 1
          fi
          echo "GTBI_REPO_DISPATCH_TOKEN secret is configured"

      - name: Validate token has repo scope
        env:
          GH_TOKEN: ${{ secrets.GTBI_REPO_DISPATCH_TOKEN }}
        run: |
          if ! gh api /repos/Dicklesworthstone/gastown_batteries_included > /dev/null 2>&1; then
            echo "::error::Token does not have access to GTBI repository"
            echo "Ensure the PAT has 'repo' scope for Dicklesworthstone/gastown_batteries_included"
            exit 1
          fi
          echo "Token has access to GTBI repository"

      - name: Check tool is in checksums.yaml
        run: |
          CHECKSUMS=$(curl -sL "https://raw.githubusercontent.com/jonbackhaus/gtbi/main/checksums.yaml")
          if ! echo "$CHECKSUMS" | grep -q "${{ env.TOOL_NAME }}:"; then
            echo "::warning::Tool '${{ env.TOOL_NAME }}' not found in GTBI checksums.yaml"
            echo "You may need to add it first, or verify the TOOL_NAME matches exactly"
          else
            echo "Tool '${{ env.TOOL_NAME }}' found in GTBI checksums.yaml"

            # Extract and display the current checksum from GTBI
            GTBI_SHA256=$(echo "$CHECKSUMS" | grep -A2 "${{ env.TOOL_NAME }}:" | grep "sha256:" | awk '{print $2}' | tr -d '"')
            LOCAL_SHA256=$(sha256sum "${{ env.INSTALLER_PATH }}" | cut -d' ' -f1)

            echo ""
            echo "Checksum comparison:"
            echo "  GTBI:  $GTBI_SHA256"
            echo "  Local: $LOCAL_SHA256"

            if [[ "$GTBI_SHA256" == "$LOCAL_SHA256" ]]; then
              echo "  Status: Checksums match"
            else
              echo "  Status: Checksums differ (notification will be sent on next push)"
            fi
          fi

      - name: Check notify-gtbi workflow exists
        run: |
          if [[ ! -f ".github/workflows/notify-gtbi.yml" ]]; then
            echo "::warning::notify-gtbi.yml workflow not found"
            echo "Copy gtbi/templates/workflows/notify-gtbi-workflow.yml to .github/workflows/notify-gtbi.yml"
          else
            echo "notify-gtbi.yml workflow is present"
          fi

      - name: Summary
        run: |
          echo "## GTBI Integration Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Installer exists | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| GTBI_REPO_DISPATCH_TOKEN | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Token has access | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation checks passed" >> $GITHUB_STEP_SUMMARY
