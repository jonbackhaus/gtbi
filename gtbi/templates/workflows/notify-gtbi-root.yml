# .github/workflows/notify-gtbi.yml
#
# Notifies GTBI when installer scripts change, triggering checksum updates.
# Use this template for repos with install.sh at the repository root.
#
# Setup:
#   1. Create a PAT with 'contents:read' on gastown_batteries_included
#   2. Add it as a secret named GTBI_REPO_DISPATCH_TOKEN in this repo
#   3. Copy this file to .github/workflows/notify-gtbi.yml
#   4. Set TOOL_NAME to the matching key in GTBI checksums.yaml
#
# Related: gastown_batteries_included-b04c
#
name: Notify GTBI of Installer Changes

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
  workflow_dispatch:  # Manual trigger for testing

env:
  # REQUIRED: Update this to match the installer key in GTBI checksums.yaml.
  TOOL_NAME: '{{ TOOL_NAME_PLACEHOLDER }}'

jobs:
  notify-gtbi:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GTBI checksum update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GTBI_REPO_DISPATCH_TOKEN }}
          repository: Dicklesworthstone/gastown_batteries_included
          event-type: upstream-changed
          client-payload: |
            {
              "tool": "${{ env.TOOL_NAME }}",
              "source_repo": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }

      - name: Log dispatch
        run: |
          echo "✅ Dispatched upstream-changed event to GTBI"
          echo "   Tool: ${{ env.TOOL_NAME }}"
          echo "   SHA: ${{ github.sha }}"
          echo "   Triggered by: ${{ github.actor }}"
